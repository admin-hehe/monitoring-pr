<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR DC BALI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Space Grotesk', sans-serif; background-color: #fef08a; color: #000; }
    
    .neo-border { border: 4px solid #000; }
    .neo-shadow { box-shadow: 10px 10px 0px 0px #000; }
    .neo-btn { border: 4px solid #000; box-shadow: 4px 4px 0px 0px #000; transition: all 0.1s; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    .neo-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
    .neo-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0px 0px 0px 0px #000; transform: translate(2px, 2px); }
    
    .neo-input { border: 4px solid #000; background: #fff; padding: 0.75rem; box-shadow: 4px 4px 0px 0px #000; font-weight: 700; }
    .neo-input:focus { background: #fefce8; outline: none; }
  </style>
</head>
<body x-data="app()" x-init="init()" @keydown.escape="closeAllModals()">

  <header class="bg-[#8b5cf6] neo-border border-t-0 border-l-0 border-r-0 py-6 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <h1 class="text-3xl md:text-5xl font-black uppercase italic tracking-tighter text-white">
        PR <span class="bg-black text-white px-2 italic">DC BALI</span>
      </h1>
      <button @click="openModal('create')" class="neo-btn bg-lime-400 px-6 py-3">
        + TAMBAH DATA_
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
      <div class="md:col-span-3">
        <input type="text" x-model="searchQuery" @input="page = 1" placeholder="CARI KEGIATAN, PIC, ATAU NOMOR DOKUMEN..." class="neo-input w-full uppercase">
      </div>
      <select x-model="filterStatus" @change="page = 1" class="neo-input bg-white uppercase">
        <option value="">SEMUA STATUS</option>
        <option value="Pending">Pending</option>
        <option value="Pengajuan">Pengajuan</option>
        <option value="Done">Done</option>
        <option value="Reject">Reject</option>
      </select>
    </div>

    <div class="neo-border neo-shadow bg-white overflow-hidden relative">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-black text-white font-black uppercase italic text-xs tracking-widest">
              <th class="p-4 border-r border-white/20">Info Kegiatan</th>
              <th class="p-4 border-r border-white/20">Nomor Dokumen</th>
              <th class="p-4 border-r border-white/20 text-right">Total Budget</th>
              <th class="p-4 border-r border-white/20 text-center">Tukar Faktur</th>
              <th class="p-4 text-center">Aksi</th>
            </tr>
          </thead>
          <tbody>
            <template x-if="isFetching">
              <template x-for="i in [1,2,3,4,5]">
                <tr class="border-b-4 border-black">
                  <td class="p-4 border-r-4 border-black">
                    <div class="h-6 bg-gray-200 animate-pulse neo-border w-3/4 mb-2"></div>
                    <div class="flex gap-2">
                      <div class="h-4 bg-gray-200 animate-pulse neo-border w-16"></div>
                      <div class="h-4 bg-gray-200 animate-pulse neo-border w-24"></div>
                    </div>
                  </td>
                  <td class="p-4 border-r-4 border-black space-y-2">
                    <div class="h-3 bg-gray-200 animate-pulse neo-border w-1/2"></div>
                    <div class="h-3 bg-gray-200 animate-pulse neo-border w-1/2"></div>
                  </td>
                  <td class="p-4 border-r-4 border-black">
                    <div class="h-6 bg-gray-200 animate-pulse neo-border w-24 ml-auto"></div>
                  </td>
                  <td class="p-4 border-r-4 border-black">
                    <div class="h-6 bg-gray-200 animate-pulse neo-border w-20 mx-auto"></div>
                  </td>
                  <td class="p-4">
                    <div class="h-10 bg-gray-200 animate-pulse neo-border w-10 mx-auto"></div>
                  </td>
                </tr>
              </template>
            </template>

            <template x-if="!isFetching && paginatedData.length === 0">
              <tr>
                <td colspan="5" class="p-10 text-center text-xl font-black uppercase italic border-b-4 border-black">
                  GAK ADA DATA YANG KETEMU BROW!
                </td>
              </tr>
            </template>

            <template x-if="!isFetching">
              <template x-for="(item, index) in paginatedData" :key="index">
                <tr @click="openModal('edit', item)" class="border-b-4 border-black hover:bg-violet-100 cursor-pointer transition-colors group">
                  <td class="p-4 border-r-4 border-black">
                    <div class="text-xl font-black uppercase leading-tight group-hover:underline" x-text="item.kegiatan"></div>
                    <div class="mt-2 flex gap-2 items-center">
                      <span class="bg-black text-white text-[10px] px-2 py-0.5 font-bold uppercase" x-text="item.pic"></span>
                      <span class="text-[10px] text-gray-700 font-bold italic" x-text="formatDate(item.timestamp)"></span>
                    </div>
                  </td>
                  <td class="p-4 border-r-4 border-black text-xs font-bold space-y-1">
                    <div>QUO: <span x-text="item.quotation || '-'"></span></div>
                    <div>INV: <span x-text="item.invoice || '-'"></span></div>
                    <div>PR: <span x-text="item.no_pr || '-'"></span></div>
                    <div>PO: <span x-text="item.no_po || '-'"></span></div>
                  </td>
                  <td class="p-4 border-r-4 border-black text-right text-xl font-black italic" x-text="formatRupiah(item.total)"></td>
                  <td class="p-4 border-r-4 border-black text-center">
                    <div class="flex flex-col items-center">
                      <span :class="{
                        'bg-orange-400': item.tukar_faktur === 'Pending',
                        'bg-cyan-400': item.tukar_faktur === 'Pengajuan',
                        'bg-lime-400': item.tukar_faktur === 'Done',
                        'bg-rose-500 text-white': item.tukar_faktur === 'Reject'
                      }" class="neo-border px-3 py-1 text-[10px] font-black uppercase mb-1" x-text="item.tukar_faktur"></span>
                      <span class="text-[9px] font-bold" x-text="formatDate(item.tanggal_tf) || ''"></span>
                    </div>
                  </td>
                  <td class="p-4 text-center" @click.stop>
                     <button @click="confirmDelete(item.timestamp)" class="neo-btn bg-rose-500 p-2 text-white group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                     </button>
                  </td>
                </tr>
              </template>
            </template>
          </tbody>
        </table>
      </div>

      <div class="bg-black text-white p-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="font-bold text-sm">
          TOTAL: <span x-text="filteredData.length"></span> DATA
        </div>
        
        <div class="flex items-center gap-3">
          <button @click="prevPage()" :disabled="page === 1" class="neo-btn bg-white text-black px-4 py-1 text-sm">
            PREV
          </button>
          <div class="font-black bg-yellow-300 text-black px-3 py-1 neo-border text-sm">
            HAL <span x-text="page"></span> DARI <span x-text="totalPages"></span>
          </div>
          <button @click="nextPage()" :disabled="page === totalPages" class="neo-btn bg-white text-black px-4 py-1 text-sm">
            NEXT
          </button>
        </div>

        <div class="flex items-center gap-2">
          <span class="text-xs font-bold">BARIS:</span>
          <select x-model="pageSize" @change="page = 1" class="neo-border text-black text-xs font-bold p-1">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>
    </div>
  </main>

  <div x-show="modalOpen" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-md">
    <div @click.away="closeAllModals()" class="neo-border neo-shadow bg-white w-full max-w-3xl p-8 relative overflow-y-auto max-h-[90vh]">
      <div class="flex justify-between items-center mb-8 bg-black text-white p-4 neo-border">
        <h2 class="text-2xl font-black uppercase italic" x-text="formMode === 'create' ? 'INPUT_BARU' : 'EDIT_DATA'"></h2>
        <button @click="closeAllModals()" class="font-black text-xl hover:text-rose-500">[CLOSE]</button>
      </div>
      
      <form @submit.prevent="submitForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">Quotation No</label><input type="text" x-model="formData.quotation" class="neo-input uppercase" required></div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">Invoice No</label><input type="text" x-model="formData.invoice" class="neo-input uppercase" required></div>
        <div class="md:col-span-2 flex flex-col"><label class="text-[10px] font-black uppercase">Kegiatan / Project Name</label><input type="text" x-model="formData.kegiatan" class="neo-input uppercase" required></div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">PIC Pelaksana</label><input type="text" x-model="formData.pic" class="neo-input uppercase" required></div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">Total (IDR)</label>
          <input type="text" :value="formatInput(formData.total)" @input="formData.total = $event.target.value.replace(/\D/g, '')" class="neo-input text-xl font-black" placeholder="0" required>
        </div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">No PR</label><input type="text" x-model="formData.no_pr" class="neo-input uppercase"></div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">No PO</label><input type="text" x-model="formData.no_po" class="neo-input uppercase"></div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">Status Tukar Faktur</label>
          <select x-model="formData.tukar_faktur" class="neo-input font-black uppercase bg-white">
            <option value="Pending">Pending</option>
            <option value="Pengajuan">Pengajuan</option>
            <option value="Done">Done</option>
            <option value="Reject">Reject</option>
          </select>
        </div>
        <div class="flex flex-col"><label class="text-[10px] font-black uppercase">Tanggal Tukar Faktur</label><input type="date" x-model="formData.tanggal_tf" class="neo-input font-black"></div>
        
        <div class="md:col-span-2 pt-6">
          <button type="submit" :disabled="loading" class="neo-btn w-full bg-lime-400 py-4 text-2xl font-black italic">
             <span x-text="loading ? 'SYNCING...' : 'SAVE_CHANGES_'"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div x-show="confirmModal" x-cloak class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-rose-500/90">
    <div class="neo-border neo-shadow bg-white p-10 max-w-md text-center">
      <div class="bg-black text-white p-4 neo-border mb-6">
        <h2 class="text-3xl font-black uppercase italic">HAPUS_DATA?</h2>
      </div>
      <p class="font-black uppercase mb-8 leading-tight text-xl">Yakin hapus data brow?<br>Gak bakal bisa balik lagi!</p>
      <div class="flex gap-4">
        <button @click="confirmModal = false" class="neo-btn bg-white flex-1 py-4">BATAL</button>
        <button @click="doDelete()" class="neo-btn bg-black text-white flex-1 py-4 italic">Sikat Hapus!</button>
      </div>
    </div>
  </div>

  <div x-show="toast.show" x-cloak 
       class="fixed bottom-10 right-10 z-[100] border-[4px] border-black bg-white p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex items-center gap-4">
    <div :class="toast.type === 'success' ? 'bg-lime-400' : 'bg-rose-500'" class="p-2 border-[3px] border-black">
      <template x-if="toast.type === 'success'">
        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M20 6L9 17l-5-5"/></svg>
      </template>
      <template x-if="toast.type === 'error'">
        <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </template>
    </div>
    <div class="font-black uppercase italic tracking-tight">
      <div class="text-[10px] underline">System_Report</div>
      <div class="text-xl" x-text="toast.message"></div>
    </div>
  </div>

  <script>
    function app() {
      return {
        GAS_URL: '/api',
        modalOpen: false,
        confirmModal: false,
        formMode: 'create',
        loading: false,
        isFetching: false, // Flag skeleton load
        items: [],
        searchQuery: '',
        filterStatus: '',
        formData: {},
        deleteTarget: null,
        toast: { show: false, message: '', type: 'success' },

        // State Pagination
        page: 1,
        pageSize: 10,

        async init() { await this.fetchData(); },

        async fetchData() {
          this.isFetching = true;
          try {
            const res = await fetch(this.GAS_URL, { cache: "no-store" });
            const data = await res.json();
            this.items = data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          } catch (e) { 
            this.showToast('Gagal muat data!', 'error'); 
          } finally {
            this.isFetching = false;
          }
        },

        async submitForm() {
          this.loading = true;
          const payload = { 
            ...this.formData, 
            action: this.formMode === 'edit' ? 'update' : 'create', 
            id: this.formMode === 'edit' ? String(this.formData.timestamp) : null
          };

          try {
            await fetch(this.GAS_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(payload)
            });
            
            this.modalOpen = false;
            this.showToast(this.formMode === 'create' ? 'BERHASIL DISIMPAN!' : 'UPDATE BERHASIL!', 'success');
            
            setTimeout(() => this.fetchData(), 2000);
          } catch (e) {
            this.showToast('KONEKSI ERROR!', 'error');
          } finally {
            this.loading = false;
          }
        },

        confirmDelete(ts) { this.deleteTarget = ts; this.confirmModal = true; },

        async doDelete() {
          this.confirmModal = false;
          this.isFetching = true; // Langsung trigger loading skeleton
          const payload = { 
            action: 'delete', 
            id: this.deleteTarget
          };

          try {
            await fetch(this.GAS_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(payload)
            });
            this.showToast('Data dihapus!', 'success');
            setTimeout(() => this.fetchData(), 2000);
          } catch (e) {
            this.showToast('Gagal hapus!', 'error');
            this.isFetching = false;
          }
        },

        showToast(msg, type = 'success') {
          this.toast = { show: true, message: msg, type };
          setTimeout(() => this.toast.show = false, 3000);
        },

        formatRupiah(n) {
          return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n || 0);
        },

        formatInput(v) {
          return v ? v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '';
        },

        formatDate(dateStr) {
          if (!dateStr) return '-';
          try {
            const date = new Date(dateStr);
            return date.toLocaleString('id-ID', {
              day: '2-digit',
              month: 'short',
              year: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            }).replace(/\./g, ':');
          } catch (e) {
            return dateStr;
          }
        },

        openModal(mode, data = null) {
          this.formMode = mode;
          if (mode === 'edit' && data) {
            this.formData = {
              timestamp: String(data.timestamp),
              quotation: data.quotation || '',
              invoice: data.invoice || '',
              kegiatan: data.kegiatan || '',
              pic: data.pic || '',
              total: data.total || '',
              no_pr: data.no_pr || '',
              no_po: data.no_po || '',
              tukar_faktur: data.tukar_faktur || 'Pending',
              tanggal_tf: data.tanggal_tf ? new Date(data.tanggal_tf).toISOString().split('T')[0] : ''
            };
          } else {
            this.formData = { 
              quotation: '', invoice: '', kegiatan: '', pic: '', 
              total: '', no_pr: '', no_po: '', 
              tukar_faktur: 'Pending', tanggal_tf: '' 
            };
          }
          this.modalOpen = true;
        },

        closeAllModals() { this.modalOpen = false; this.confirmModal = false; },

        // GETTER: Cari & Filter Data
        get filteredData() {
          return this.items.filter(i => {
            const s = `${i.kegiatan} ${i.pic} ${i.invoice} ${i.no_pr} ${i.no_po}`.toLowerCase();
            return s.includes(this.searchQuery.toLowerCase()) && 
                   (this.filterStatus === '' || i.tukar_faktur === this.filterStatus);
          });
        },

        // GETTER: Total Halaman
        get totalPages() {
          return Math.ceil(this.filteredData.length / this.pageSize) || 1;
        },

        // GETTER: Memotong Data Sesuai Pagination
        get paginatedData() {
          const start = (this.page - 1) * this.pageSize;
          const end = start + parseInt(this.pageSize);
          return this.filteredData.slice(start, end);
        },

        // Fungsi Tombol Pagination
        nextPage() { if (this.page < this.totalPages) this.page++; },
        prevPage() { if (this.page > 1) this.page--; }
      }
    }
  </script>
</body>
</html>
