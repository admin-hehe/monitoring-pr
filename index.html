<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR DC Bali</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    input:focus, select:focus { ring: 2px; ring-color: #818cf8; outline: none; border-color: #818cf8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="app()" x-init="init()">
  
  <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="p-2.5 bg-indigo-600 rounded-xl text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-950 tracking-tight">Purchase<span class="text-indigo-600">Requisition</span></h1>
      </div>
      <button @click="showForm = !showForm" class="flex items-center gap-2 bg-indigo-600 text-white px-5 py-2.5 rounded-xl shadow-md hover:bg-indigo-700 transition-all duration-150 transform hover:scale-105 active:scale-95 text-sm font-semibold">
        <svg x-show="!showForm" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        <svg x-show="showForm" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
        <span x-text="showForm ? 'Tutup Form' : 'Tambah Data'"></span>
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    
    <div x-show="showForm" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform -translate-y-4"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform -translate-y-4"
         x-cloak
         class="bg-white p-7 rounded-3xl shadow-xl border border-slate-100 mb-10">
      
      <h2 class="text-lg font-bold mb-6 text-slate-800 flex items-center gap-2">
        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        Input Entry Baru
      </h2>

      <form @submit.prevent="submitForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">Quotation</label><input type="text" name="quotation" placeholder="QO-xxxx" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required></div>
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">Invoice</label><input type="text" name="invoice" placeholder="INV-xxxx" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required></div>
        <div class="space-y-1 md:col-span-2"><label class="text-xs font-medium text-slate-500">Nama Kegiatan</label><input type="text" name="kegiatan" placeholder="Deskripsi project..." class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required></div>
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">PIC</label><input type="text" name="pic" placeholder="Nama PIC" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required></div>
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">Total (Rp)</label><input type="number" name="total" placeholder="Contoh: 1500000" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required></div>
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">No PR</label><input type="text" name="no_pr" placeholder="PR-..." class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50"></div>
        <div class="space-y-1"><label class="text-xs font-medium text-slate-500">No PO</label><input type="text" name="no_po" placeholder="PO-..." class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50"></div>
        <div class="space-y-1 md:col-span-2 lg:col-span-2"><label class="text-xs font-medium text-slate-500">Status Tukar Faktur</label>
          <select name="tukar_faktur" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50" required>
            <option value="">-- Pilih Status --</option>
            <option value="Pending">Pending</option>
            <option value="Pengajuan">Pengajuan</option>
            <option value="Done">Done</option>
            <option value="Reject">Reject</option>
          </select>
        </div>
        <div class="space-y-1 md:col-span-2 lg:col-span-1"><label class="text-xs font-medium text-slate-500">Tanggal TF</label><input type="date" name="tanggal_tf" class="w-full p-3 border border-slate-200 rounded-xl bg-slate-50"></div>
        
        <div class="lg:col-span-4 flex justify-end pt-3">
          <button type="submit" :disabled="loading" class="w-full md:w-auto bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 disabled:opacity-50 transition flex items-center justify-center gap-2">
            <svg x-show="loading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span x-text="loading ? 'Menyimpan...' : 'Simpan Data ke Spreadsheet'"></span>
          </button>
        </div>
      </form>
    </div>

    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
      <div class="relative w-full md:w-96">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </span>
        <input type="text" x-model="searchQuery" placeholder="Cari Kegiatan, PIC, Invoice..." class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl bg-white w-full">
      </div>
      <div class="flex items-center gap-3 w-full md:w-auto">
        <label class="text-sm font-medium text-slate-500 hidden md:block">Filter Status:</label>
        <select x-model="filterStatus" class="p-3 border border-slate-200 rounded-xl bg-white w-full md:w-48 text-sm">
          <option value="">Semua Status</option>
          <option value="Pending">Pending</option>
          <option value="Pengajuan">Pengajuan</option>
          <option value="Done">Done</option>
          <option value="Reject">Reject</option>
        </select>
        <button @click="fetchData()" class="p-3 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 active:scale-95 transition" title="Refresh Data">
            <svg class="w-5 h-5" :class="{'animate-spin': refreshing}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
          <thead class="bg-slate-50/50 border-b border-slate-100 text-slate-600">
            <tr>
              <th class="p-5 font-semibold">Detail Kegiatan</th>
              <th class="p-5 font-semibold text-right">Total (IDR)</th>
              <th class="p-5 font-semibold">Dokumen</th>
              <th class="p-5 font-semibold">PR / PO</th>
              <th class="p-5 font-semibold text-center">Status TF</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            <template x-if="refreshing && items.length === 0">
              <tr><td colspan="5" class="p-10 text-center text-slate-500"><svg class="animate-spin h-5 w-5 mx-auto mb-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Memuat data...</td></tr>
            </template>
            <template x-if="!refreshing && filteredData.length === 0">
                <tr><td colspan="5" class="p-10 text-center text-slate-400">Data tidak ditemukan atau masih kosong.</td></tr>
            </template>

            <template x-for="(item, index) in paginatedData" :key="index">
              <tr class="hover:bg-indigo-50/30 transition-colors duration-150">
                <td class="p-5">
                  <div class="font-semibold text-slate-900 text-base" x-text="item.kegiatan"></div>
                  <div class="text-xs text-slate-500 flex items-center gap-1.5 mt-1">
                    <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span x-text="item.pic"></span>
                  </div>
                </td>
                <td class="p-5 text-right">
                  <div class="font-bold text-base text-slate-950" x-text="formatRupiah(item.total)"></div>
                </td>
                <td class="p-5 text-xs space-y-1">
                  <div class="flex items-center gap-1.5"><span class="font-medium text-slate-400 w-8">Inv:</span> <span class="text-slate-700" x-text="item.invoice"></span></div>
                  <div class="flex items-center gap-1.5"><span class="font-medium text-slate-400 w-8">Quo:</span> <span class="text-slate-700" x-text="item.quotation"></span></div>
                </td>
                <td class="p-5 text-xs font-mono text-slate-600 space-y-1">
                  <div x-text="'PR: ' + (item.no_pr || '-')"></div>
                  <div x-text="'PO: ' + (item.no_po || '-')"></div>
                </td>
                <td class="p-5">
                  <div class="flex flex-col items-center gap-1.5">
                    <span :class="{
                      'bg-amber-100 text-amber-800 border border-amber-200': item.tukar_faktur === 'Pending',
                      'bg-sky-100 text-sky-800 border border-sky-200': item.tukar_faktur === 'Pengajuan',
                      'bg-emerald-100 text-emerald-800 border border-emerald-200': item.tukar_faktur === 'Done',
                      'bg-rose-100 text-rose-800 border border-rose-200': item.tukar_faktur === 'Reject'
                    }" class="px-3 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider w-28 text-center" x-text="item.tukar_faktur"></span>
                    <span class="text-xs text-slate-500" x-text="item.tanggal_tf ? formatDateIndo(item.tanggal_tf) : '-'"></span>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <div class="p-5 border-t border-slate-100 bg-slate-50/50 flex items-center justify-between">
        <div class="text-sm text-slate-600">
          Menampilkan <span class="font-semibold text-slate-800" x-text="paginatedData.length"></span> dari <span class="font-semibold text-slate-800" x-text="filteredData.length"></span> data
        </div>
        <div class="flex gap-2">
          <button @click="prevPage()" :disabled="page === 1" class="flex items-center gap-1 px-4 py-2 border border-slate-200 rounded-xl bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:opacity-40 disabled:pointer-events-none transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Prev
          </button>
          <button @click="nextPage()" :disabled="page >= totalPages" class="flex items-center gap-1 px-4 py-2 border border-slate-200 rounded-xl bg-white text-sm font-medium text-slate-700 hover:bg-slate-50 disabled:opacity-40 disabled:pointer-events-none transition">
            Next
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>
    </div>
  
    <footer class="mt-12 text-center text-xs text-slate-400 pb-6">
        Project Tracker Apps v2.0 | Built with simplicity.
    </footer>
  </main>

  <script>
    function app() {
      return {
        GAS_URL: 'https://script.google.com/macros/s/AKfycbzND5FYQL56NoVyFSVuO3hFLv4TSa9qvtCNMlXPZCXv1o3iv_LaRi0aEFR2HV06R04u/exec', 
        
        showForm: false,
        loading: false,
        refreshing: false,
        items: [],
        searchQuery: '',
        filterStatus: '',
        page: 1,
        pageSize: 10,

        async init() {
          await this.fetchData();
        },

        async fetchData() {
          this.refreshing = true;
          try {
            const res = await fetch(this.GAS_URL);
            const data = await res.json();
            this.items = data.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            this.page = 1;
          } catch (e) {
            console.error("Fetch error:", e);
            alert('Gagal memuat data. Cek koneksi atau URL GAS.');
          } finally {
            this.refreshing = false;
          }
        },

        get filteredData() {
          return this.items.filter(i => {
            const searchStr = `${i.kegiatan} ${i.pic} ${i.invoice} ${i.quotation}`.toLowerCase();
            const matchSearch = searchStr.includes(this.searchQuery.toLowerCase());
            const matchStatus = this.filterStatus === '' || i.tukar_faktur === this.filterStatus;
            return matchSearch && matchStatus;
          });
        },

        get paginatedData() {
          const start = (this.page - 1) * this.pageSize;
          return this.filteredData.slice(start, start + this.pageSize);
        },

        get totalPages() {
          return Math.ceil(this.filteredData.length / this.pageSize) || 1;
        },

        nextPage() { if(this.page < this.totalPages) this.page++; },
        prevPage() { if(this.page > 1) this.page--; },

        async submitForm(e) {
          this.loading = true;
          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            await fetch(this.GAS_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify(data)
            });
            e.target.reset();
            this.showForm = false;
            alert('Data berhasil dikirim! Silakan refresh data setelah beberapa saat.');
            setTimeout(() => this.fetchData(), 2000);
          } catch (err) {
            alert('Error saat kirim data.');
            console.error(err);
          } finally {
            this.loading = false;
          }
        },
        formatRupiah(number) {
          if(!number) return 'Rp 0';
          return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        },
        formatDateIndo(dateStr) {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }
      }
    }
  </script>
</body>
</html>
